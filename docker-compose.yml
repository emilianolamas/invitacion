services:
  invitacion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invitacion
    restart: unless-stopped
    ports:
      - "3847:3847"
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - ADMIN_KEY=${ADMIN_KEY:-cachito2019$}
    volumes:
      - invitacion-data:/app/data

volumes:
  invitacion-data:
